name: review-gate

on:
  push:
    branches:
      - 'claude/**'
      - 'ai/review'

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            let approved = false;
            try {
              const f = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'review.md',
                ref: 'ai/review',
              });
              const body = Buffer.from(f.data.content, 'base64').toString('utf8');
              const firstLine = body.split('\n')[0];
              approved = /^STATUS:\s*APPROVED\s*$/.test(firstLine.trim());
            } catch (e) {
              core.warning('review.md not found on ai/review branch: ' + e.message);
            }

            for (const pr of prs.data) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state: approved ? 'success' : 'pending',
                context: 'review-gate',
                description: approved ? 'APPROVED by reviewer' : 'review in progress',
              });
            }
